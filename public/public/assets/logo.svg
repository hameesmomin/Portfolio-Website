<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-labelledby="title desc">
  <title id="title">Hamees Momin monogram</title>
  <desc id="desc">A dark HM monogram shaped with flowing glass and water inspired curves.</desc>
  <defs>
    <linearGradient id="glass" x1="28" y1="24" x2="190" y2="199" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f6fbff"/>
      <stop offset=".42" stop-color="#7bdff2"/>
      <stop offset="1" stop-color="#2446ff"/>
    </linearGradient>
    <linearGradient id="deep" x1="42" y1="31" x2="175" y2="191" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10151d"/>
      <stop offset="1" stop-color="#020307"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
