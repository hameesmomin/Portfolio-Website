    <path d="M78 159c28-65 55-98 86-98h3v98h-22V96c-21 19-37 41-50 63H78z" fill="#f6fbff" fill-opacity=".86"/>
  </g>
  <path d="M44 178c31-19 58-21 86-7 24 12 41 9 55-10" fill="none" stroke="#f6fbff" stroke-opacity=".46" stroke-width="5" stroke-linecap="round"/>
